<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! - Victor & Leticia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #D4B96A;
      --cream: #FFF8F0;
      --dark: #2C2C2C;
      --font-cursive: 'Great Vibes', cursive;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Montserrat', sans-serif;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-serif);
      overflow: hidden;
      background: #000;
    }

    /* Foto de fondo fullscreen */
    .bg-photo {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .bg-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Overlay oscuro */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.65) 100%);
    }

    /* Contenedor de fuegos artificiales */
    .fireworks-container {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    /* Mensaje central */
    .thank-you {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .ty-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.4);
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
    }

    .ty-icon svg {
      width: 36px;
      height: 36px;
    }

    .ty-title {
      font-family: var(--font-cursive);
      font-size: 3.5rem;
      color: white;
      text-shadow: 0 3px 20px rgba(0,0,0,0.5);
      line-height: 1.2;
      margin-bottom: 0.8rem;
      animation: fadeUp 0.8s ease 0.5s both;
    }

    .ty-message {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 300;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      line-height: 1.8;
      max-width: 400px;
      animation: fadeUp 0.8s ease 0.8s both;
    }

    .ty-date {
      margin-top: 1.5rem;
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      color: var(--gold-light);
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s ease 1.1s both;
    }

    .ty-separator {
      width: 60px;
      height: 1.5px;
      background: var(--gold);
      margin: 1.5rem auto;
      opacity: 0.6;
      animation: fadeUp 0.8s ease 1s both;
    }

    .ty-names {
      font-family: var(--font-cursive);
      font-size: 2rem;
      color: var(--gold-light);
      text-shadow: 0 2px 15px rgba(0,0,0,0.4);
      animation: fadeUp 0.8s ease 1.3s both;
    }

    .ty-back {
      margin-top: 2.5rem;
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: white;
      border: 1.5px solid rgba(255,255,255,0.4);
      padding: 0.7rem 2rem;
      border-radius: 50px;
      transition: all 0.3s ease;
      animation: fadeUp 0.8s ease 1.5s both;
    }

    .ty-back:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.7);
    }

    /* Particulas de fuegos artificiales */
    .firework {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      animation: sparkFade var(--duration, 1.5s) ease-out forwards;
    }

    .spark-trail {
      position: absolute;
      width: 2px;
      border-radius: 2px;
      animation: trailUp var(--duration, 0.8s) ease-out forwards;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes sparkFade {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    @keyframes trailUp {
      0% {
        transform: translateY(0) scaleY(1);
        opacity: 0.8;
      }
      60% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(var(--trail-h)) scaleY(0.3);
        opacity: 0;
      }
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* Boton musica */
    .music-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.4);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .music-toggle:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.6);
    }

    .music-toggle .music-icon-off { display: none; }
    .music-toggle.paused .music-icon-on { display: none; }
    .music-toggle.paused .music-icon-off { display: block; }

    @media (min-width: 480px) {
      .ty-title { font-size: 4.5rem; }
      .ty-message { font-size: 1.3rem; }
      .ty-icon { width: 80px; height: 80px; }
      .ty-icon svg { width: 42px; height: 42px; }
    }
  </style>
</head>
<body>

  <!-- Foto de fondo -->
  <div class="bg-photo">
    <img src="fotos/image7.jpeg" alt="Victor y Leticia">
  </div>
  <div class="bg-overlay"></div>

  <!-- Fuegos artificiales -->
  <div class="fireworks-container" id="fireworks"></div>

  <!-- Mensaje -->
  <div class="thank-you">
    <div class="ty-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </div>
    <h1 class="ty-title">¡Gracias!</h1>
    <p class="ty-message">
      Estamos deseando compartir este dia tan especial con vosotros.
    </p>
    <div class="ty-separator"></div>
    <p class="ty-date">Os esperamos el 29 de mayo de 2027</p>
    <p class="ty-names">Victor & Leticia</p>
    <a href="index.html" class="ty-back">Volver a la invitacion</a>
  </div>

  <!-- Boton musica -->
  <button class="music-toggle" id="music-toggle">
    <svg class="music-icon-on" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
    </svg>
    <svg class="music-icon-off" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
      <line x1="1" y1="1" x2="23" y2="23" stroke-width="2.5"/>
    </svg>
  </button>

  <audio id="bg-music" loop preload="auto">
    <source src="nupcial.mp3" type="audio/mpeg">
  </audio>

  <script>
  (function () {
    'use strict';

    // ============ MUSICA ============
    var music = document.getElementById('bg-music');
    var musicBtn = document.getElementById('music-toggle');
    var playing = false;

    music.volume = 0.5;
    var p = music.play();
    if (p !== undefined) {
      p.then(function () { playing = true; })
       .catch(function () {
          musicBtn.classList.add('paused');
          // Intentar reproducir al primer toque en la pantalla
          function playOnTouch() {
            music.play().then(function () {
              playing = true;
              musicBtn.classList.remove('paused');
            });
            document.removeEventListener('click', playOnTouch);
            document.removeEventListener('touchstart', playOnTouch);
          }
          document.addEventListener('click', playOnTouch);
          document.addEventListener('touchstart', playOnTouch);
       });
    }

    musicBtn.addEventListener('click', function () {
      if (playing) {
        music.pause();
        playing = false;
        musicBtn.classList.add('paused');
      } else {
        music.play().then(function () {
          playing = true;
          musicBtn.classList.remove('paused');
        });
      }
    });

    // ============ FUEGOS ARTIFICIALES ============
    var container = document.getElementById('fireworks');

    var colors = [
      ['#FF6B6B', '#FF8E8E', '#FFB3B3'],
      ['#FFD700', '#FFEA70', '#FFF4B0'],
      ['#7B68EE', '#9A8AFF', '#C4BAFF'],
      ['#00CED1', '#40E0D0', '#7FFFD4'],
      ['#FF69B4', '#FF85C8', '#FFB6DD'],
      ['#FF4500', '#FF6A33', '#FF9966'],
      ['#C9A84C', '#D4B96A', '#E8D5A0'],
      ['#50C878', '#6FDB94', '#A0EABC'],
    ];

    function createFirework() {
      var x = Math.random() * window.innerWidth;
      var y = Math.random() * window.innerHeight * 0.5 + window.innerHeight * 0.1;
      var palette = colors[Math.floor(Math.random() * colors.length)];
      var sparkCount = 30 + Math.floor(Math.random() * 25);

      // Trail (estela ascendente)
      var trail = document.createElement('div');
      trail.className = 'spark-trail';
      var trailH = -(60 + Math.random() * 100);
      trail.style.cssText =
        'left:' + x + 'px;top:' + (y - trailH) + 'px;' +
        'height:' + Math.abs(trailH) + 'px;' +
        'background:linear-gradient(to top,' + palette[0] + ',transparent);' +
        '--trail-h:' + trailH + 'px;--duration:0.6s;';
      container.appendChild(trail);

      setTimeout(function () {
        if (trail.parentNode) trail.parentNode.removeChild(trail);

        // Explosion
        for (var i = 0; i < sparkCount; i++) {
          var spark = document.createElement('div');
          spark.className = 'spark';
          var angle = (Math.PI * 2 / sparkCount) * i + (Math.random() - 0.5) * 0.3;
          var dist = 40 + Math.random() * 100;
          var tx = Math.cos(angle) * dist;
          var ty = Math.sin(angle) * dist + Math.random() * 30; // gravedad
          var size = 2 + Math.random() * 4;
          var duration = 1 + Math.random() * 1;
          var color = palette[Math.floor(Math.random() * palette.length)];

          spark.style.cssText =
            'left:' + x + 'px;top:' + y + 'px;' +
            'width:' + size + 'px;height:' + size + 'px;' +
            'background:' + color + ';' +
            'box-shadow:0 0 ' + (size * 2) + 'px ' + color + ';' +
            '--tx:' + tx + 'px;--ty:' + ty + 'px;' +
            '--duration:' + duration + 's;';

          container.appendChild(spark);

          (function (s, d) {
            setTimeout(function () {
              if (s.parentNode) s.parentNode.removeChild(s);
            }, d * 1000 + 100);
          })(spark, duration);
        }
      }, 550);
    }

    // Lanzar fuegos continuamente
    function launchFireworks() {
      // Oleada inicial
      for (var i = 0; i < 3; i++) {
        setTimeout(createFirework, i * 400);
      }

      // Continuos
      setInterval(function () {
        createFirework();
        if (Math.random() > 0.4) {
          setTimeout(createFirework, 200 + Math.random() * 400);
        }
        if (Math.random() > 0.7) {
          setTimeout(createFirework, 500 + Math.random() * 300);
        }
      }, 1200);
    }

    launchFireworks();
  })();
  </script>
</body>
</html>
